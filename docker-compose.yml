#http
version: "3.8"

services:
  app:
    image: ghcr.io/mahn-ke/crop-by-vincent:latest
    restart: on-failure:5
    environment:
      - PORT=3013
    ports:
      - "3013:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3013/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
